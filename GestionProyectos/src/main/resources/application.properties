#### Ruta oauth y Configuracion General
app.author=umu
app.apiname=pds
app.server.path=/${app.author}/${app.apiname}

spring.application.name=GestionProyectos

# URL para integracion con IA (Groq)
groq.api.url=https://api.groq.com/openai/v1/chat/completions

#### Base de Datos H2 (Modo Archivo - Estilo UMULingo)
# Los datos se guardaran en la carpeta 'data' del proyecto para que no se pierdan
spring.datasource.url=jdbc:h2:file:./data/gestion_proyectos;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#### Configuracion JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# 'update' crea o actualiza las tablas automaticamente al detectar vuestras @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.defer-datasource-initialization=true

# Mostrar las consultas SQL en la consola (Muy util para el desarrollo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

#### Configuracion de la consola H2
# Podreis entrar en http://localhost:8080/h2-console para ver las tablas
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=true

#### SpringDoc / Swagger
springdoc.server.path=/${app.author}/${app.apiname}
springdoc.api-docs.path=/api-docs
springdoc.pathsToMatch=${springdoc.server.path}/**
springdoc.swagger-ui.path=/swagger-ui-custom.html
